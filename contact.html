<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Contact - DREAMSTORY
</title>

<!-- CSS -->

<link rel="stylesheet"
href="style.css">

<!-- GOOGLE FONT -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap"
rel="stylesheet">

<!-- FONT AWESOME -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- AOS -->

<link rel="stylesheet"
href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

</head>

<body>

<div class="background-glow"></div>

<!-- NAVBAR -->

<div id="navbar-container"></div>

<!-- HERO -->

<section class="hero">

<h1
data-aos="fade-up">

CONTACT RO - HIT STORIES

</h1>

<p
data-aos="fade-up"
data-aos-delay="300">

Got ideas,
feedback,
or story suggestions?

Let’s connect.

</p>

</section>

<!-- CONTACT SECTION -->

<section
class="stories-section"
style="
display:flex;
justify-content:center;
padding-bottom:100px;
">

<div
class="story-card"
style="
max-width:850px;
width:100%;
"
data-aos="zoom-in">

<div class="story-content">

<h2>
GET IN TOUCH
</h2>

<p>

If you want to share feedback,
story ideas,
collaborations,
or just say hello,
feel free to connect.

<br><br>

RO - HIT STORIES is constantly evolving with new universes,
stories,
and adventures.

</p>

<br><br>

<!-- CONTACT FORM -->

<form
class="contact-form"
action="https://formspree.io/f/xojrrpkn"
method="POST">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<textarea
name="message"
rows="6"
placeholder="Your Message OR Feedback"
required>
</textarea>

<button
type="submit"
class="next-btn">

Send Message

</button>

</form>

<br><br>

<!-- SOCIALS -->

<h2>
SOCIALS
</h2>

<div
style="
display:flex;
gap:25px;
font-size:2rem;
margin-top:25px;
flex-wrap:wrap;
align-items:center;
">

<a
href="https://www.instagram.com/roohit.badole?igsh=MzRodTZnbXAzZXFs"
target="_blank">

<i class="fa-brands fa-instagram"></i>

</a>

<a
href="https://youtube.com/@hit-boxx?si=toCj4K2Mx693kBUK"
target="_blank">

<i class="fa-brands fa-youtube"></i>

</a>

<a
href="https://github.com/roohitgit"
target="_blank">

<i class="fa-brands fa-github"></i>

</a>

<a
href="https://discord.com/users/349292313941377026"
target="_blank">

<i class="fa-brands fa-discord"></i>

</a>

</div>

</div>

</div>

</section>

<!-- FOOTER -->

<div id="footer-container"></div>

AOS.init();
</script>

</body>

</html>
